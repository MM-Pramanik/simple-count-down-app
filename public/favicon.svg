<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" stroke="url(#strokeGradient)" stroke-width="6"/>
  <circle cx="100" cy="100" r="76" fill="url(#innerGradient)" stroke="white" stroke-width="2" stroke-opacity="0.15"/>
  
  <!-- Progress ring segments -->
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#progressGradient)" stroke-width="12" stroke-dasharray="439.82" stroke-dashoffset="109.96" stroke-linecap="round" transform="rotate(-90 100 100)"/>
    <circle cx="100" cy="100" r="52" fill="none" stroke="url(#accentGradient)" stroke-width="10" stroke-dasharray="326.73" stroke-dashoffset="245.05" stroke-linecap="round" transform="rotate(120 100 100)"/>
  </g>

  <!-- Floating particles / dots -->
  <g filter="url(#glow)">
    <circle cx="142" cy="75" r="6" fill="#FF6B6B" stroke="white" stroke-width="1.5"/>
    <circle cx="58" cy="138" r="5" fill="#4ECDC4" stroke="white" stroke-width="1.5"/>
    <circle cx="155" cy="140" r="4" fill="#FFE66D" stroke="white" stroke-width="1.5"/>
    <circle cx="45" cy="52" r="5" fill="#A37BFF" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Main countdown number "5" with modern look -->
  <g filter="url(#textGlow)">
    <text x="100" y="125" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', 'Poppins', system-ui, sans-serif" font-size="68" font-weight="700" fill="white" stroke="url(#textStroke)" stroke-width="2" paint-order="stroke">5</text>
  </g>

  <!-- Small time units -->
  <g filter="url(#glow)">
    <text x="60" y="158" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="14" font-weight="600" fill="#FFE66D" opacity="0.9">min</text>
    <text x="140" y="158" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="14" font-weight="600" fill="#4ECDC4" opacity="0.9">sec</text>
  </g>

  <!-- Decorative ticks -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="100" y1="26" x2="100" y2="36" stroke="url(#tickGradient)"/>
    <line x1="100" y1="164" x2="100" y2="174" stroke="url(#tickGradient)"/>
    <line x1="164" y1="100" x2="174" y2="100" stroke="url(#tickGradient)"/>
    <line x1="26" y1="100" x2="36" y2="100" stroke="url(#tickGradient)"/>
  </g>

  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B2F4C"/>
      <stop offset="1" stop-color="#1A1E2F"/>
    </linearGradient>
    
    <linearGradient id="strokeGradient" x1="30" y1="30" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B6B"/>
      <stop offset="0.5" stop-color="#4ECDC4"/>
      <stop offset="1" stop-color="#FFE66D"/>
    </linearGradient>
    
    <linearGradient id="innerGradient" x1="50" y1="50" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F3557"/>
      <stop offset="1" stop-color="#1F2440"/>
    </linearGradient>
    
    <linearGradient id="progressGradient" x1="30" y1="30" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8E8E"/>
      <stop offset="0.5" stop-color="#A37BFF"/>
      <stop offset="1" stop-color="#6CD4FF"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="60" y1="60" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE66D"/>
      <stop offset="1" stop-color="#FF9F6D"/>
    </linearGradient>
    
    <linearGradient id="tickGradient" x1="90" y1="90" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE66D"/>
      <stop offset="1" stop-color="#4ECDC4"/>
    </linearGradient>
    
    <linearGradient id="textStroke" x1="60" y1="60" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B6B"/>
      <stop offset="0.5" stop-color="#A37BFF"/>
      <stop offset="1" stop-color="#4ECDC4"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>